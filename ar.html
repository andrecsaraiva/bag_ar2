<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Bag AR Try-On — WebXR</title>
<style>
  :root { color-scheme: dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%; background: #0d0d0f; font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
    color: #fff; overflow: hidden;
  }
  #intro {
    position: fixed; inset: 0; z-index: 30;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 32px; gap: 18px;
    background: radial-gradient(circle at 50% 30%, #1c1c22, #0d0d0f);
  }
  #intro h1 { font-size: 22px; font-weight: 650; }
  #intro p { font-size: 14px; line-height: 1.5; color: #a8a8b0; max-width: 340px; }
  #startBtn {
    margin-top: 8px; padding: 15px 34px; font-size: 16px; font-weight: 600;
    border: none; border-radius: 100px; background: #f5f3ee; color: #16161a; cursor: pointer;
  }
  #startBtn:active { transform: scale(0.97); }
  #unsupported { display: none; color: #ff8a80; font-size: 13px; max-width: 340px; }

  #hud { position: fixed; inset: 0; z-index: 20; display: none; pointer-events: none; }
  #gestureLayer { position: fixed; inset: 0; z-index: 21; pointer-events: auto; touch-action: none; }
  #status {
    position: absolute; top: env(safe-area-inset-top, 14px); left: 50%;
    transform: translateX(-50%); margin-top: 14px; z-index: 24;
    background: rgba(0,0,0,0.62); backdrop-filter: blur(8px);
    padding: 9px 18px; border-radius: 100px; font-size: 13px; white-space: nowrap;
  }
  #bottomBar {
    position: absolute; left: 0; right: 0; bottom: 0; z-index: 26;
    padding: 16px 16px calc(env(safe-area-inset-bottom, 16px) + 16px);
    display: flex; gap: 9px; justify-content: center; flex-wrap: wrap; pointer-events: auto;
  }
  .pill {
    padding: 13px 18px; font-size: 14px; font-weight: 650; border-radius: 100px;
    border: 1px solid rgba(255,255,255,0.18); background: rgba(20,20,24,0.78);
    backdrop-filter: blur(8px); color: #fff; cursor: pointer;
  }
  .pill:active { transform: scale(0.96); }
  .pill.hidden { display: none; }
  .pill.light { background: #f5f3ee; color: #16161a; }
  #exitBtn {
    position: absolute; top: env(safe-area-inset-top, 14px); right: 14px; margin-top: 14px;
    width: 38px; height: 38px; border-radius: 50%; pointer-events: auto; z-index: 26;
    background: rgba(0,0,0,0.62); border: none; color: #fff; font-size: 18px; cursor: pointer;
  }
  #toast {
    position: absolute; bottom: 112px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.8); padding: 8px 16px; border-radius: 100px; z-index: 26;
    font-size: 12px; opacity: 0; transition: opacity .25s; white-space: nowrap;
  }
  #debugPanel {
    position: absolute; left: 8px; right: 8px; z-index: 28;
    top: calc(env(safe-area-inset-top, 14px) + 60px);
    height: 40vh; display: flex; flex-direction: column;
    background: rgba(0,0,0,0.82); border: 1px solid rgba(124,255,178,0.4);
    border-radius: 10px; pointer-events: auto; overflow: hidden;
  }
  #debugLog {
    flex: 1; overflow-y: auto; padding: 8px 10px;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 10px; line-height: 1.45; color: #b9f5cf;
    white-space: pre-wrap; word-break: break-word;
  }
  #debugLog .warn { color: #ffd27c; }
  #debugLog .err  { color: #ff8a80; }
  #debugLog .ok   { color: #7CFFB2; }
  #debugBtns { display: flex; border-top: 1px solid rgba(255,255,255,0.12); }
  .dbg {
    flex: 1; padding: 10px 4px; font-size: 12px; font-weight: 600;
    background: rgba(20,20,24,0.9); color: #fff; border: none;
    border-right: 1px solid rgba(255,255,255,0.1); cursor: pointer;
  }
  .dbg:last-child { border-right: none; }
  .dbg:active { background: rgba(124,255,178,0.2); }
  #showLogBtn {
    position: absolute; left: 14px; z-index: 26;
    top: calc(env(safe-area-inset-top, 14px) + 14px);
    padding: 7px 12px; font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
    background: rgba(0,0,0,0.62); border: 1px solid rgba(124,255,178,0.5);
    color: #7CFFB2; border-radius: 8px; pointer-events: auto; cursor: pointer;
  }
  #debugPanel.hidden, #showLogBtn.hidden { display: none; }
</style>
</head>
<body>

<div id="intro">
  <h1>Try-On de Bolsa</h1>
  <p>Aponte a câmera para uma <b>superfície horizontal</b>, como chão, mesa ou bancada. Mova o celular devagar para o AR reconhecer a superfície, depois toque para posicionar a bolsa.</p>
  <button id="startBtn">Iniciar câmera</button>
  <p id="unsupported">⚠️ Este aparelho/navegador não suporta WebXR AR.<br>Use o <b>Google Chrome</b> num Android com ARCore.</p>
</div>

<div id="hud">
  <div id="gestureLayer"></div>
  <div id="status">Iniciando…</div>
  <button id="exitBtn">✕</button>
  <div id="toast"></div>

  <div id="debugPanel">
    <div id="debugLog"></div>
    <div id="debugBtns">
      <button class="dbg" id="copyLogBtn">Copiar log</button>
      <button class="dbg" id="clearLogBtn">Limpar</button>
      <button class="dbg" id="hideLogBtn">Ocultar</button>
    </div>
  </div>
  <button id="showLogBtn">LOG</button>

  <div id="bottomBar">
    <button class="pill hidden" id="resetBtn">Reposicionar</button>
    <button class="pill hidden" id="rotateLeftBtn">↺</button>
    <button class="pill hidden" id="rotateRightBtn">↻</button>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ===================== CONFIG =====================
// Coloque o GLB da bolsa na raiz com este nome.
const MODEL_URL  = './bag.glb';

// Escala do GLB. Se vier muito grande/pequeno, ajuste aqui.
const MODEL_SCALE = 1.0;

// Tamanho real opcional. Deixe null para usar o tamanho nativo.
// Exemplo: { width: 0.38 } força a largura para 38 cm.
const MODEL_REAL_SIZE = null;

// Centraliza em X/Z e apoia a base no Y=0.
const MODEL_AUTOCENTER_XZ = true;

// Superfície horizontal: 1 = perfeitamente para cima.
// 0.72 aceita chão/mesa com alguma inclinação.
const HORIZONTAL_DOT_MIN = 0.72;

const SURFACE_OFFSET = 0.006;
const ROTATE_STEP = THREE.MathUtils.degToRad(15);
const DRAG_SENSITIVITY = 1.0;

const ENABLE_SHADOW = true;
const SHADOW_OPACITY = 0.32;
const SHADOW_SIZE_MULTIPLIER = 2.9;
// ==================================================

const statusEl = document.getElementById('status');
const introEl  = document.getElementById('intro');
const hudEl    = document.getElementById('hud');
const gestureLayer = document.getElementById('gestureLayer');
const toastEl  = document.getElementById('toast');
const startBtn = document.getElementById('startBtn');
const exitBtn  = document.getElementById('exitBtn');
const resetBtn = document.getElementById('resetBtn');
const rotateLeftBtn = document.getElementById('rotateLeftBtn');
const rotateRightBtn = document.getElementById('rotateRightBtn');

const debugPanel = document.getElementById('debugPanel');
const debugLogEl = document.getElementById('debugLog');
const DBG = {
  lines: [],
  max: 400,
  t0: performance.now(),
  push(msg, cls){
    const t = ((performance.now() - this.t0) / 1000).toFixed(2);
    const entry = '[' + t + 's] ' + msg;
    this.lines.push({ text: entry, cls: cls || '' });
    if (this.lines.length > this.max) this.lines.shift();
    this.render();
  },
  render(){
    if (!debugLogEl) return;
    debugLogEl.innerHTML = this.lines
      .map(l => l.cls ? '<span class="'+l.cls+'">'+esc(l.text)+'</span>' : esc(l.text))
      .join('\n');
    debugLogEl.scrollTop = debugLogEl.scrollHeight;
  },
  text(){ return this.lines.map(l => l.text).join('\n'); }
};
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

document.getElementById('showLogBtn').addEventListener('click', ()=>{
  debugPanel.classList.remove('hidden');
  document.getElementById('showLogBtn').classList.add('hidden');
});
document.getElementById('hideLogBtn').addEventListener('click', ()=>{
  debugPanel.classList.add('hidden');
  document.getElementById('showLogBtn').classList.remove('hidden');
});
document.getElementById('clearLogBtn').addEventListener('click', ()=>{ DBG.lines = []; DBG.render(); });
document.getElementById('copyLogBtn').addEventListener('click', async ()=>{
  const txt = DBG.text();
  try { await navigator.clipboard.writeText(txt); toast('Log copiado — cole no chat'); }
  catch(e){
    const ta = document.createElement('textarea');
    ta.value = txt; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); toast('Log copiado'); }
    catch(e2){ toast('Copie manualmente do painel'); }
    document.body.removeChild(ta);
  }
});

let renderer, scene, camera;
let reticle, footprintPreview, bagModel, shadowPlane, bagPlaced = false;
let xrSession = null, xrRefSpace = null, viewerSpace = null;
let hitTestSource = null;
let modelTemplate = null;
let toastTimer = null;

let modelSize = { width: 0.4, height: 0.35, depth: 0.16 };
let modelYaw = 0;
let modelScaleMultiplier = 1.0;
let placedPosition = new THREE.Vector3();
let lastPlacementMatrix = new THREE.Matrix4();

const activePointers = new Map();
let singleStart = null;
let pinchStart = null;
let gestureMoved = false;

function setStatus(t){ statusEl.textContent = t; }
function toast(t){
  toastEl.textContent = t; toastEl.style.opacity = 1;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ toastEl.style.opacity = 0; }, 2200);
}

async function checkSupport(){
  if (!('xr' in navigator)) return false;
  try { return await navigator.xr.isSessionSupported('immersive-ar'); }
  catch(e){ return false; }
}

checkSupport().then(ok => {
  DBG.push('=== Bag WebXR Try-On debug ===');
  DBG.push('UA: ' + navigator.userAgent);
  DBG.push('WebXR immersive-ar suportado: ' + ok, ok ? 'ok' : 'err');
  DBG.push('tela: ' + innerWidth + 'x' + innerHeight + ' dpr=' + devicePixelRatio);
  if (!ok){
    startBtn.style.display = 'none';
    document.getElementById('unsupported').style.display = 'block';
  }
});

function preloadModel(){
  DBG.push('carregando GLB: ' + MODEL_URL);
  return new Promise((resolve, reject)=>{
    new GLTFLoader().load(MODEL_URL,
      gltf => {
        try {
          modelTemplate = normalizeBagModel(gltf.scene);
          prepareModelForAR(modelTemplate);
          DBG.push('GLB OK -> bolsa ' + modelSize.width.toFixed(3) + ' x '
            + modelSize.height.toFixed(3) + ' x ' + modelSize.depth.toFixed(3) + ' m', 'ok');
          resolve();
        } catch(e){
          DBG.push('ERRO ao normalizar GLB: ' + e.message, 'err');
          reject(e);
        }
      },
      undefined,
      err => {
        DBG.push('ERRO ao carregar GLB: ' + (err && err.message || err), 'err');
        reject(err);
      }
    );
  });
}

function normalizeBagModel(root){
  let box = new THREE.Box3().setFromObject(root);
  let size = new THREE.Vector3(); box.getSize(size);
  let center = new THREE.Vector3(); box.getCenter(center);

  const group = new THREE.Group();

  if (MODEL_AUTOCENTER_XZ) {
    root.position.x -= center.x;
    root.position.z -= center.z;
  }
  root.position.y -= box.min.y;

  group.add(root);
  group.scale.setScalar(MODEL_SCALE);

  const scaled = new THREE.Group();
  scaled.add(group);

  let box2 = new THREE.Box3().setFromObject(scaled);
  let size2 = new THREE.Vector3(); box2.getSize(size2);

  if (MODEL_REAL_SIZE && MODEL_REAL_SIZE.width && size2.x > 0){
    const factor = MODEL_REAL_SIZE.width / size2.x;
    group.scale.multiplyScalar(factor);
    box2 = new THREE.Box3().setFromObject(scaled);
    box2.getSize(size2);
  }

  modelSize = { width: size2.x, height: size2.y, depth: size2.z };
  console.log('[AR] bolsa normalizada (m):', modelSize);
  return scaled;
}


function prepareModelForAR(root){
  root.traverse(obj => {
    if (!obj.isMesh) return;
    obj.castShadow = true;
    obj.receiveShadow = true;
    if (obj.material) {
      obj.material.needsUpdate = true;
      if ('envMapIntensity' in obj.material) obj.material.envMapIntensity = 0.75;
    }
  });
}

startBtn.addEventListener('click', async ()=>{
  setStatus('Carregando modelo…');
  introEl.style.display = 'none';
  hudEl.style.display = 'block';
  try { await preloadModel(); }
  catch(e){
    introEl.style.display = 'flex'; hudEl.style.display = 'none';
    document.getElementById('unsupported').style.display = 'block';
    document.getElementById('unsupported').textContent = 'Falha ao carregar o modelo 3D (' + MODEL_URL + ').';
    return;
  }
  startAR();
});

async function startAR(){
  initThree();
  refreshFootprintPreview();

  try {
    xrSession = await navigator.xr.requestSession('immersive-ar', {
      requiredFeatures: ['hit-test'],
      optionalFeatures: ['dom-overlay', 'anchors', 'light-estimation'],
      domOverlay: { root: hudEl }
    });
    DBG.push('sessao immersive-ar criada', 'ok');
  } catch(e){
    DBG.push('ERRO ao criar sessao AR: ' + e.message, 'err');
    setStatus('Não foi possível abrir a câmera AR.');
    introEl.style.display = 'flex'; hudEl.style.display = 'none';
    return;
  }

  renderer.xr.setReferenceSpaceType('local');
  await renderer.xr.setSession(xrSession);

  xrRefSpace  = await xrSession.requestReferenceSpace('local');
  viewerSpace = await xrSession.requestReferenceSpace('viewer');
  DBG.push('reference spaces local + viewer OK', 'ok');

  try {
    hitTestSource = await xrSession.requestHitTestSource({ space: viewerSpace });
    DBG.push('hitTestSource criado (espaco=viewer)', 'ok');
  } catch(e){
    DBG.push('ERRO ao criar hitTestSource: ' + e.message, 'err');
  }

  xrSession.addEventListener('end', onSessionEnd);

  DBG.push('HORIZONTAL_DOT_MIN=' + HORIZONTAL_DOT_MIN + ' normal.y precisa ser >=' + HORIZONTAL_DOT_MIN);
  DBG.push('gestos: 1 dedo arrasta | 2 dedos rotaciona');
  DBG.push('loop iniciado — aponte p/ chão, mesa ou bancada e mova devagar');
  setStatus('Procurando superfície… mova o celular devagar');
  renderer.setAnimationLoop(onXRFrame);
}

function onSessionEnd(){
  renderer.setAnimationLoop(null);
  if (hitTestSource){ hitTestSource.cancel?.(); hitTestSource = null; }
  xrSession = null;
  hudEl.style.display = 'none';
  introEl.style.display = 'flex';
  bagPlaced = false;
  hideModelControls();
  DBG.push('sessao AR encerrada — o log acima pode ser copiado');
}

exitBtn.addEventListener('click', ()=> xrSession && xrSession.end());

resetBtn.addEventListener('click', ()=>{
  if (bagModel){ scene.remove(bagModel); bagModel = null; }
  bagPlaced = false;
  reticle.visible = false;
  footprintPreview.visible = false;
  if (shadowPlane) shadowPlane.visible = false;
  modelYaw = 0;
  modelScaleMultiplier = 1.0;
  placedPosition.set(0,0,0);
  hideModelControls();
  setStatus('Procurando superfície… mova o celular devagar');
});

rotateLeftBtn.addEventListener('click', ()=>{ modelYaw += ROTATE_STEP; updatePlacedModelTransformOnly(); });
rotateRightBtn.addEventListener('click', ()=>{ modelYaw -= ROTATE_STEP; updatePlacedModelTransformOnly(); });

function showModelControls(){
  resetBtn.classList.remove('hidden');
  rotateLeftBtn.classList.remove('hidden');
  rotateRightBtn.classList.remove('hidden');
}
function hideModelControls(){
  resetBtn.classList.add('hidden');
  rotateLeftBtn.classList.add('hidden');
  rotateRightBtn.classList.add('hidden');
}

function initThree(){
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.01, 30);

  renderer = new THREE.WebGLRenderer({ alpha:true, antialias:true });
  renderer.setPixelRatio(devicePixelRatio);
  renderer.setSize(innerWidth, innerHeight);
  renderer.xr.enabled = true;
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  if ('outputColorSpace' in renderer) renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 2;
  document.body.appendChild(renderer.domElement);
  renderer.domElement.style.position = 'fixed';
  renderer.domElement.style.inset = '0';
  renderer.domElement.style.zIndex = '10';

  const hemi = new THREE.HemisphereLight(0xffffff, 0x3a3a46, 0.95);
  scene.add(hemi);

  const key = new THREE.DirectionalLight(0xffffff, 1.25);
  key.position.set(0.8, 2.3, 0.9);
  key.castShadow = true;
  key.shadow.mapSize.set(1024, 1024);
  key.shadow.camera.near = 0.05;
  key.shadow.camera.far = 6;
  key.shadow.camera.left = -2;
  key.shadow.camera.right = 2;
  key.shadow.camera.top = 2;
  key.shadow.camera.bottom = -2;
  scene.add(key);

  const fill = new THREE.DirectionalLight(0xffffff, 0.28);
  fill.position.set(-1.8, 1.2, -0.8);
  scene.add(fill);

  reticle = makeReticle();
  reticle.visible = false;
  reticle.matrixAutoUpdate = false;
  scene.add(reticle);

  footprintPreview = makeFootprintPreview();
  footprintPreview.visible = false;
  footprintPreview.matrixAutoUpdate = false;
  scene.add(footprintPreview);

  shadowPlane = makeShadowPlane();
  shadowPlane.visible = false;
  scene.add(shadowPlane);

  addEventListener('resize', ()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
}

function makeReticle(){
  const g = new THREE.Group();
  const ring = new THREE.Mesh(
    new THREE.RingGeometry(0.045, 0.055, 40),
    new THREE.MeshBasicMaterial({ color: 0x7CFFB2, side: THREE.DoubleSide, transparent:true, opacity:0.95 })
  );
  const dot = new THREE.Mesh(
    new THREE.CircleGeometry(0.006, 20),
    new THREE.MeshBasicMaterial({ color: 0x7CFFB2 })
  );
  ring.rotation.x = -Math.PI / 2;
  dot.rotation.x = -Math.PI / 2;
  g.add(ring, dot);
  return g;
}

function makeFootprintPreview(){
  const w = modelSize.width / 2;
  const d = modelSize.depth / 2;
  const pts = [
    new THREE.Vector3(-w,0,-d), new THREE.Vector3( w,0,-d),
    new THREE.Vector3( w,0, d), new THREE.Vector3(-w,0, d),
    new THREE.Vector3(-w,0,-d)
  ];
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const line = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0x7CFFB2, transparent:true, opacity:0.9 }));
  return line;
}


function makeShadowPlane(){
  const size = Math.max(modelSize.width, modelSize.depth, 0.4) * SHADOW_SIZE_MULTIPLIER;
  const geo = new THREE.PlaneGeometry(size, size);
  const mat = new THREE.ShadowMaterial({ opacity: SHADOW_OPACITY, transparent: true });
  const plane = new THREE.Mesh(geo, mat);
  plane.rotation.x = -Math.PI / 2;
  plane.receiveShadow = true;
  plane.renderOrder = -1;
  return plane;
}

function refreshFootprintPreview(){
  if (!footprintPreview) return;
  scene.remove(footprintPreview);
  footprintPreview = makeFootprintPreview();
  footprintPreview.visible = false;
  footprintPreview.matrixAutoUpdate = false;
  scene.add(footprintPreview);

  if (shadowPlane) {
    scene.remove(shadowPlane);
    shadowPlane = makeShadowPlane();
    shadowPlane.visible = false;
    scene.add(shadowPlane);
  }
}

const _m = new THREE.Matrix4();
const _q = new THREE.Quaternion();
const _p = new THREE.Vector3();
const _s = new THREE.Vector3();

function surfaceNormalFromPose(matrix){
  const q = new THREE.Quaternion();
  const p = new THREE.Vector3();
  const s = new THREE.Vector3();
  matrix.decompose(p, q, s);
  return new THREE.Vector3(0,1,0).applyQuaternion(q).normalize();
}

function isHorizontalSurface(normal){ return normal.y >= HORIZONTAL_DOT_MIN; }

function yawFromCameraToPosition(pos){
  const cam = new THREE.Vector3();
  camera.getWorldPosition(cam);
  const toCam = cam.clone().sub(pos);
  toCam.y = 0;

  if (toCam.lengthSq() > 0.0001) return Math.atan2(toCam.x, toCam.z);
  return modelYaw;
}

function composeBagMatrix(pos, yaw){
  const quat = new THREE.Quaternion().setFromEuler(new THREE.Euler(0, yaw, 0));
  const out = new THREE.Matrix4();
  // Escala fixa: o produto sempre mantém o tamanho real do GLB.
  out.compose(pos, quat, new THREE.Vector3(1, 1, 1));
  return out;
}

function poseOnSurface(hitMatrix){
  hitMatrix.decompose(_p, _q, _s);
  const normal = new THREE.Vector3(0,1,0).applyQuaternion(_q).normalize();
  const pos = _p.clone().addScaledVector(normal, SURFACE_OFFSET);
  const yaw = bagPlaced ? modelYaw : yawFromCameraToPosition(pos);
  return composeBagMatrix(pos, yaw);
}

function placeBagFromMatrix(matrix){
  if (!bagModel){
    bagModel = modelTemplate.clone(true);
    prepareModelForAR(bagModel);
    scene.add(bagModel);
  }

  bagModel.matrixAutoUpdate = false;
  lastPlacementMatrix.copy(matrix);
  matrix.decompose(placedPosition, _q, _s);

  const e = new THREE.Euler().setFromQuaternion(_q, 'YXZ');
  modelYaw = e.y;

  bagModel.matrix.copy(composeBagMatrix(placedPosition, modelYaw));
  bagPlaced = true;
  showModelControls();
  updateShadowPlane();
  setStatus('Bolsa posicionada — arraste com 1 dedo, gire com 2 dedos');
  toast('Bolsa posicionada em AR');
  DBG.push('bolsa FIXADA na superfície', 'ok');
}

function onSelect(){
  DBG.push('TOQUE na tela. reticle.visible=' + reticle.visible);
  if (!reticle.visible) {
    toast('Aponte para uma superfície primeiro');
    return;
  }
  placeBagFromMatrix(reticle.matrix);
}

function updatePlacedModelTransformOnly(){
  if (!bagModel || !bagPlaced) return;
  bagModel.matrix.copy(composeBagMatrix(placedPosition, modelYaw));
  updateShadowPlane();
}

function updateShadowPlane(){
  if (!shadowPlane || !ENABLE_SHADOW || !bagPlaced) return;
  shadowPlane.visible = true;
  shadowPlane.position.copy(placedPosition);
  shadowPlane.position.y += 0.001;
  shadowPlane.rotation.set(-Math.PI / 2, 0, 0);
  const base = Math.max(modelSize.width, modelSize.depth, 0.4) * SHADOW_SIZE_MULTIPLIER ;
  shadowPlane.scale.setScalar(base / shadowPlane.geometry.parameters.width);
}

function getScreenDragBasis(){
  const right = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
  right.y = 0;
  if (right.lengthSq() < 0.0001) right.set(1,0,0);
  right.normalize();

  const forward = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
  forward.y = 0;
  if (forward.lengthSq() < 0.0001) forward.set(0,0,-1);
  forward.normalize();

  return { right, forward };
}

function metersPerPixelAtPlacedObject(){
  const camPos = new THREE.Vector3();
  camera.getWorldPosition(camPos);
  const dist = Math.max(0.35, camPos.distanceTo(placedPosition));
  const verticalMeters = 2 * dist * Math.tan(THREE.MathUtils.degToRad(camera.fov * 0.5));
  return (verticalMeters / Math.max(1, innerHeight)) * DRAG_SENSITIVITY;
}

function dist2D(a,b){
  const dx = a.x - b.x, dy = a.y - b.y;
  return Math.sqrt(dx*dx + dy*dy);
}

function angle2D(a,b){
  return Math.atan2(b.y - a.y, b.x - a.x);
}

function getTwoPointers(){
  const arr = Array.from(activePointers.values());
  return [arr[0], arr[1]];
}

gestureLayer.addEventListener('pointerdown', (e)=>{
  if (e.target.closest('button')) return;
  e.preventDefault();
  gestureLayer.setPointerCapture?.(e.pointerId);
  activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  gestureMoved = false;

  if (activePointers.size === 1){
    singleStart = {
      x: e.clientX,
      y: e.clientY,
      pos: placedPosition.clone(),
      basis: getScreenDragBasis(),
      mpp: metersPerPixelAtPlacedObject(),
    };
    pinchStart = null;
  }

  if (activePointers.size === 2 && bagPlaced){
    const [a,b] = getTwoPointers();
    pinchStart = {
      dist: dist2D(a,b),
      angle: angle2D(a,b),
      yaw: modelYaw,
    };
  }
}, { passive:false });

gestureLayer.addEventListener('pointermove', (e)=>{
  if (!activePointers.has(e.pointerId)) return;
  e.preventDefault();

  activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (!bagPlaced) return;

  if (activePointers.size === 1 && singleStart){
    const p = activePointers.get(e.pointerId);
    const dx = p.x - singleStart.x;
    const dy = p.y - singleStart.y;

    if (Math.abs(dx) + Math.abs(dy) > 4) gestureMoved = true;

    const move = new THREE.Vector3();
    move.addScaledVector(singleStart.basis.right, dx * singleStart.mpp);
    move.addScaledVector(singleStart.basis.forward, -dy * singleStart.mpp);

    placedPosition.copy(singleStart.pos).add(move);
    updatePlacedModelTransformOnly();
  }

  if (activePointers.size === 2 && pinchStart){
    const [a,b] = getTwoPointers();
    const d = dist2D(a,b);
    const ang = angle2D(a,b);

    if (Math.abs(d - pinchStart.dist) > 3 || Math.abs(ang - pinchStart.angle) > 0.02) gestureMoved = true;

    modelYaw = pinchStart.yaw - (ang - pinchStart.angle);
    updatePlacedModelTransformOnly();
  }
}, { passive:false });

gestureLayer.addEventListener('pointerup', (e)=>{
  if (!activePointers.has(e.pointerId)) return;
  e.preventDefault();

  activePointers.delete(e.pointerId);

  if (activePointers.size === 0){
    const wasTap = !gestureMoved;
    singleStart = null;
    pinchStart = null;

    // Depois que a bolsa foi criada, tocar/arrastar não deve reposicionar no reticle verde.
    // Para reposicionar por hit-test, use o botão Reposicionar primeiro.
    if (wasTap && !bagPlaced) onSelect();
    return;
  }

  if (activePointers.size === 1){
    const p = Array.from(activePointers.values())[0];
    singleStart = {
      x: p.x,
      y: p.y,
      pos: placedPosition.clone(),
      basis: getScreenDragBasis(),
      mpp: metersPerPixelAtPlacedObject(),
    };
    pinchStart = null;
  }
}, { passive:false });

gestureLayer.addEventListener('pointercancel', (e)=>{
  activePointers.delete(e.pointerId);
  if (activePointers.size === 0){
    singleStart = null;
    pinchStart = null;
  }
}, { passive:false });

let _dbgLastSummary = 0;
let _dbgFrameCount = 0;
let _dbgMaxHits = 0;
let _dbgLastSurfaceState = null;
let _dbgFirstHitLogged = false;
let _dbgFirstSurfaceLogged = false;

function onXRFrame(timestamp, frame){
  if (!frame) return;
  if (!hitTestSource){ renderer.render(scene, camera); return; }

  const results = frame.getHitTestResults(hitTestSource);
  _dbgFrameCount++;
  if (results.length > _dbgMaxHits) _dbgMaxHits = results.length;

  if (!_dbgFirstHitLogged && results.length > 0){
    _dbgFirstHitLogged = true;
    DBG.push('1o hit-test recebido (' + results.length + ' resultado(s))', 'ok');
  }

  let surfaceHit = null;
  let normalsInfo = [];

  for (const r of results){
    const pose = r.getPose(xrRefSpace);
    if (!pose) continue;
    _m.fromArray(pose.transform.matrix);
    const n = surfaceNormalFromPose(_m.clone());
    normalsInfo.push({ x:n.x, y:n.y, z:n.z, horizontal: isHorizontalSurface(n) });
    if (isHorizontalSurface(n) && !surfaceHit){ surfaceHit = _m.clone(); }
  }

  if (!_dbgFirstSurfaceLogged && surfaceHit){
    _dbgFirstSurfaceLogged = true;
    DBG.push('1a superfície horizontal válida detectada', 'ok');
  }

  const curState = surfaceHit ? 'horizontal' : (results.length > 0 ? 'nonhorizontal' : 'none');
  if (curState !== _dbgLastSurfaceState){
    if (curState === 'horizontal'){
      DBG.push('-> superfície horizontal encontrada (reticle ON)', 'ok');
    } else if (curState === 'nonhorizontal'){
      const n = normalsInfo[0];
      DBG.push('-> superfície detectada, mas NAO horizontal. normal=(' + n.x.toFixed(2) + ',' + n.y.toFixed(2) + ',' + n.z.toFixed(2) + ') y=' + n.y.toFixed(2) + ' (limite ' + HORIZONTAL_DOT_MIN.toFixed(2) + ')', 'warn');
    } else {
      DBG.push('-> sem nenhum hit-test (perdeu tracking / aponta p/ vazio)', 'warn');
    }
    _dbgLastSurfaceState = curState;
  }

  if (timestamp - _dbgLastSummary > 1000){
    let line = 'frames/s~' + _dbgFrameCount + ' | hits agora=' + results.length + ' | max hits=' + _dbgMaxHits;
    if (normalsInfo.length){
      const n = normalsInfo[0];
      line += ' | normal[0]=(' + n.x.toFixed(2) + ',' + n.y.toFixed(2) + ',' + n.z.toFixed(2) + ')' + (n.horizontal ? ' HORIZONTAL' : ' nao-horizontal');
    }
    DBG.push(line);
    _dbgLastSummary = timestamp;
    _dbgFrameCount = 0;
  }

  if (surfaceHit){
    const surfacePose = poseOnSurface(surfaceHit);
    reticle.matrix.copy(surfacePose);
    if (!bagPlaced){
      reticle.visible = true;
      footprintPreview.visible = true;
      footprintPreview.matrix.copy(surfacePose);
      setStatus('Superfície encontrada — toque para posicionar a bolsa');
    } else {
      // Depois de posicionar, a mira verde fica oculta para evitar confusão;
      // a interação passa a ser apenas no modelo já criado.
      reticle.visible = false;
      footprintPreview.visible = false;
    }
  } else {
    reticle.visible = false;
    footprintPreview.visible = false;
    if (!bagPlaced && results.length > 0){
      setStatus('Superfície detectada não é horizontal — aponte para chão/mesa');
    } else if (!bagPlaced){
      setStatus('Procurando superfície… mova o celular devagar');
    }
  }

  renderer.render(scene, camera);
}
</script>
